{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card p-4 shadow">
            <h4 class="text-center mb-3">💳 Secure Payment</h4>

            <h5 class="text-center mb-4">Total: ₹{{ total }}</h5>

            <div id="card-element" class="form-control mb-3"></div>

            <button id="pay-btn" class="btn btn-success w-100">
                Pay Now
            </button>

            <p id="error-message" class="text-danger mt-2 text-center"></p>

        </div>

    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>

<script>
const stripe = Stripe("{{ stripe_public_key }}");
const elements = stripe.elements();

const card = elements.create("card");
card.mount("#card-element");

document.getElementById("pay-btn").onclick = async function () {

    document.getElementById("pay-btn").disabled = true;
    document.getElementById("pay-btn").innerText = "Processing...";

    const response = await fetch("{% url 'payment' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}"
        }
    });

    const data = await response.json();

    if (!data.client_secret) {
        document.getElementById("error-message").innerText = data.error || "Payment failed";
        return;
    }

    const result = await stripe.confirmCardPayment(data.client_secret, {
        payment_method: {
            card: card
        }
    });

    if (result.error) {
        document.getElementById("error-message").innerText = result.error.message;
        document.getElementById("pay-btn").disabled = false;
        document.getElementById("pay-btn").innerText = "Pay Now";
        return;
    }

    const confirmResponse = await fetch("{% url 'payment_confirm' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            payment_intent_id: result.paymentIntent.id,
            status: result.paymentIntent.status
        })
    });

    const confirmData = await confirmResponse.json();

    if (confirmData.success) {
        window.location.href = confirmData.redirect;
    } else {
        document.getElementById("error-message").innerText = confirmData.error;
        document.getElementById("pay-btn").disabled = false;
        document.getElementById("pay-btn").innerText = "Pay Now";
    }
};
</script>

{% endblock %}
